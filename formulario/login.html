<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Copacabana Palms</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="acesso-container">

    <!-- ABAS -->
    <div class="abas">
        <button class="aba ativa" id="aba-login" onclick="mostrarPainel('login')">ENTRAR</button>
        <button class="aba" id="aba-cadastro" onclick="mostrarPainel('cadastro')">CADASTRAR</button>
    </div>

    <!-- PAINEL LOGIN -->
    <div class="painel ativo" id="painel-login">
        <h2>Bem-vindo de volta</h2>

        <div class="msg-erro" id="erro-login"></div>

        <form onsubmit="fazerLogin(); return false;">
            <label for="login-email">E-mail</label>
            <input type="email" id="login-email" placeholder="seu@email.com" required>

            <label for="login-senha">Senha</label>
            <input type="password" id="login-senha" placeholder="••••••••" required>

            <button type="submit" class="btn-principal">ENTRAR</button>
        </form>

        <div class="voltar">
            <a href="../hotel.index.html">← Voltar ao Hotel</a>
        </div>
    </div>

    <!-- PAINEL CADASTRO -->
    <div class="painel" id="painel-cadastro">
        <h2>Criar Conta</h2>

        <form onsubmit="cadastrar(); return false;">

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" required>

            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="000.000.000-00"  maxlength="14" required>

            <label for="cep">CEP</label>
            <input type="text" id="cep" placeholder="00000-000" maxlength="9" required>

            <label for="logradouro">Rua</label>
            <input type="text" id="logradouro" readonly>

            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" readonly>

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" readonly>

            <label for="estado">Estado</label>
            <input type="text" id="estado" readonly>

            <label for="senha">Senha</label>
            <input type="password" id="senha" required>

            <label for="confirmar-senha">Confirmar Senha</label>
            <input type="password" id="confirmar-senha" required>

            <button type="submit" class="btn-principal">CADASTRAR</button>
        </form>

        <div class="voltar">
            <a href="../hotel.index.html">← Voltar ao Hotel</a>
        </div>
    </div>

</div>

<script src="../js/login.js"></script>

</body>
</html>
