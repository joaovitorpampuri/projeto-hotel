<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro (nome do hotel)</title>
</head>
<body>
    <h1>Cadastro (nome do hotel)</h1>
    <form action="../hotel.index.html" method="post">
        <label for="nome">*Nome Completo:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="email">*E-mail:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="telefone">*Telefone:</label><br>
        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required><br><br>

        <label for="cpf">*CPF:</label><br>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required ><br><br>

        <label for="senha">*Senha:</label><br>
        <input type="password" id="senha" name="senha" required><br><br>

        <label for="confirmar-senha">*Confirmar Senha:</label><br>
        <input type="password" id="confirmar-senha" name="confirmar-senha" required><br><br>

        <input type="submit" value="Cadastrar">
    </form>

</body>
